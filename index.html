<style>
:root{
  /* IndianOil palette */
  --orange:#E46713; --orange-soft:#f0853a; --orange-tint:#fff1e6;
  --navy:#111E3E; --navy-2:#1a2c52;
  /* Apple-light surfaces */
  --bg:#f5f6f8; --bg-grad-top:#eef1f6;
  --card:#ffffff; --card-2:#fbfcfe;
  --line:#e7e9ee; --line-2:#eef0f4;
  --txt:#1c2430; --txt-2:#5b6573; --txt-3:#8b94a3;
  --pos:#c2410c; --neg:#0f9d6e; --zero:#9aa3b2;
  --radius:18px; --radius-sm:13px;
  --shadow:0 1px 2px rgba(17,30,62,.04), 0 6px 20px rgba(17,30,62,.06);
  --shadow-lg:0 4px 12px rgba(17,30,62,.08), 0 16px 40px rgba(17,30,62,.10);
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0e1320; --bg-grad-top:#121a2c;
    --card:#172033; --card-2:#1b2538;
    --line:#27324a; --line-2:#222c42;
    --txt:#eef2f8; --txt-2:#a7b1c4; --txt-3:#7b8499;
    --orange-tint:#2a1d12;
    --pos:#ff8a4c; --neg:#3fd29a; --zero:#7b8499;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.28);
    --shadow-lg:0 4px 12px rgba(0,0,0,.35), 0 16px 40px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;color:var(--txt);
  background:linear-gradient(180deg,var(--bg-grad-top),var(--bg) 240px);
  background-attachment:fixed;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--orange);text-decoration:none}

/* ---------- Header ---------- */
header{position:sticky;top:0;z-index:30;
  background:color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line-2);
  padding:calc(var(--safe-top) + 12px) 16px 12px}
.hrow{display:flex;align-items:center;gap:11px;max-width:1040px;margin:0 auto}
.brandmark{width:30px;height:30px;border-radius:8px;flex:none;object-fit:cover;
  box-shadow:0 1px 4px rgba(17,30,62,.18)}
.htitle{font-weight:700;font-size:18px;letter-spacing:-.3px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{background:var(--card);border:1px solid var(--line);color:var(--txt);
  padding:8px 13px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:var(--shadow);transition:transform .12s ease, box-shadow .12s ease}
.btn:hover{box-shadow:var(--shadow-lg)}
.btn:active{transform:scale(.95)}
.btn.accent{background:linear-gradient(180deg,var(--orange-soft),var(--orange));
  border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(228,103,19,.35)}
.btn.icon{padding:8px 11px;font-size:15px;font-weight:700}
.status{font-size:12px;color:var(--txt-3);margin:8px auto 0;display:flex;align-items:center;gap:7px;
  max-width:1040px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--txt-3);flex:none;
  box-shadow:0 0 0 3px color-mix(in srgb,var(--txt-3) 18%,transparent)}
.dot.ok{background:var(--neg);box-shadow:0 0 0 3px color-mix(in srgb,var(--neg) 20%,transparent)}
.dot.err{background:#e0524e;box-shadow:0 0 0 3px rgba(224,82,78,.2)}
.dot.load{background:var(--orange);box-shadow:0 0 0 3px rgba(228,103,19,.2);
  animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ---------- Search ---------- */
.searchwrap{padding:14px 16px 0;max-width:1040px;margin:0 auto}
.search{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
  padding:13px 16px;border-radius:13px;font-size:16px;outline:none;
  box-shadow:var(--shadow);transition:border-color .15s, box-shadow .15s}
.search::placeholder{color:var(--txt-3)}
.search:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(228,103,19,.12)}

main{padding:16px 16px calc(var(--safe-bot) + 48px);max-width:1040px;margin:0 auto}

/* ---------- Section labels ---------- */
.section-label{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--txt-3);margin:26px 4px 12px;display:flex;align-items:center;gap:8px}
.section-label:first-child{margin-top:10px}
.section-label::before{content:"";width:14px;height:2px;border-radius:2px;background:var(--orange);opacity:.7}

/* ---------- Index cards ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(164px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:5px;min-height:74px;
  justify-content:center;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease}
.card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--orange-soft),var(--orange));opacity:0;transition:opacity .15s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:transparent}
.card:hover::after{opacity:1}
.card:active{transform:translateY(0) scale(.99)}
.card .cname{font-weight:650;font-size:14.5px;line-height:1.32;letter-spacing:-.2px}
.card .cmeta{font-size:12.5px;color:var(--txt-3)}
.card .cbal{font-size:14px;font-weight:750;margin-top:3px;letter-spacing:-.2px;font-variant-numeric:tabular-nums}
.card.feature{background:linear-gradient(135deg,var(--navy-2),var(--navy));border-color:transparent}
.card.feature .cname{color:#fff}
.card.feature .cmeta{color:rgba(255,255,255,.6)}
.card.feature::after{display:none}
.pos{color:var(--pos)} .zero{color:var(--zero)} .neg{color:var(--neg)}

/* ---------- Summary stat tiles ---------- */
.ledger-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:8px 0 18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 16px;box-shadow:var(--shadow)}
.stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-3);font-weight:600}
.stat .val{font-size:21px;font-weight:750;margin-top:5px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.stat.hero{background:linear-gradient(135deg,var(--navy-2),var(--navy));border-color:transparent}
.stat.hero .lbl{color:rgba(255,255,255,.65)}
.stat.hero .val{color:#fff}

/* ---------- Tables ---------- */
.tablewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:auto;-webkit-overflow-scrolling:touch;margin-top:6px;box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:max-content}
th,td{padding:11px 15px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line-2)}
th{position:sticky;top:0;background:var(--card-2);font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;color:var(--txt-3);font-weight:700;z-index:2;
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
td{color:var(--txt)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--orange-tint)}
tr:last-child td{border-bottom:none}
tbody tr:active{background:var(--orange-tint)}

.subtitle{color:var(--txt-2);font-size:13.5px;margin:0 4px 16px;font-weight:500}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--orange-tint);
  border:1px solid color-mix(in srgb,var(--orange) 22%,transparent);color:var(--orange);font-weight:600}

/* ---------- States ---------- */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:80px 20px;text-align:center;color:var(--txt-3)}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--orange);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:var(--card);border:1px solid #e0524e;border-radius:var(--radius);
  padding:20px;margin-top:16px;font-size:14px;color:var(--txt);box-shadow:var(--shadow)}
.errbox code{background:var(--navy);padding:2px 7px;border-radius:6px;font-size:12px;
  color:var(--orange-soft);word-break:break-all}
.hide{display:none!important}
.empty{padding:44px 20px;text-align:center;color:var(--txt-3);font-size:14px}

/* index hero logo */
.indexhero{display:flex;align-items:center;gap:14px;padding:6px 4px 2px}
.indexhero img{width:54px;height:54px;border-radius:16px;object-fit:cover;box-shadow:var(--shadow);
  animation:logoFloat 6s ease-in-out infinite, logoGlow 4.5s ease-in-out infinite}
.indexhero .ht{font-size:22px;font-weight:800;letter-spacing:-.6px;
  background:linear-gradient(90deg,var(--txt),var(--txt) 55%,var(--orange));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.indexhero .hs{font-size:13px;color:var(--txt-3);margin-top:1px}

/* ============================================================
   Motion layer — aesthetic entrance, ambient glow, micro-interactions.
   All of it collapses under prefers-reduced-motion (see bottom).
   ============================================================ */

/* Ambient drifting aurora behind the whole page */
body::before{content:"";position:fixed;inset:-20% -10% auto -10%;height:560px;z-index:-1;
  pointer-events:none;opacity:.7;
  background:
    radial-gradient(420px 300px at 18% 12%, color-mix(in srgb,var(--orange) 22%,transparent), transparent 70%),
    radial-gradient(460px 320px at 88% 4%, color-mix(in srgb,#2a8bdc 20%,transparent), transparent 72%);
  filter:blur(8px);animation:auroraDrift 18s ease-in-out infinite alternate}
@keyframes auroraDrift{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(2.5%,1.5%,0) scale(1.06)}
  100%{transform:translate3d(-2%,-1%,0) scale(1.03)}
}

/* Animated logo */
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(-1.5deg)}}
@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 4px 10px rgba(228,103,19,.28))}
  50%{filter:drop-shadow(0 6px 18px rgba(30,146,224,.34))}
}
.brandmark{animation:logoGlow 4.5s ease-in-out infinite}

/* Entrance: rise + fade, staggered for direct children of #main */
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
main.anim>*{animation:riseIn .5s cubic-bezier(.22,.61,.36,1) both}
main.anim>*:nth-child(1){animation-delay:.02s}
main.anim>*:nth-child(2){animation-delay:.08s}
main.anim>*:nth-child(3){animation-delay:.14s}
main.anim>*:nth-child(4){animation-delay:.20s}
main.anim>*:nth-child(5){animation-delay:.26s}
main.anim>*:nth-child(n+6){animation-delay:.30s}

/* Cards cascade within a grid */
main.anim .grid .card{animation:popIn .46s cubic-bezier(.22,.61,.36,1) both}
main.anim .grid .card:nth-child(1){animation-delay:.05s}
main.anim .grid .card:nth-child(2){animation-delay:.10s}
main.anim .grid .card:nth-child(3){animation-delay:.15s}
main.anim .grid .card:nth-child(4){animation-delay:.20s}
main.anim .grid .card:nth-child(5){animation-delay:.25s}
main.anim .grid .card:nth-child(6){animation-delay:.30s}
main.anim .grid .card:nth-child(7){animation-delay:.34s}
main.anim .grid .card:nth-child(8){animation-delay:.38s}
main.anim .grid .card:nth-child(n+9){animation-delay:.42s}

/* Stat tiles + first table rows */
main.anim .stat{animation:popIn .5s cubic-bezier(.22,.61,.36,1) both}
main.anim .stat:nth-child(2){animation-delay:.07s}
main.anim .stat:nth-child(3){animation-delay:.13s}
main.anim tbody tr:nth-child(-n+14){animation:riseIn .42s ease both}
main.anim tbody tr:nth-child(1){animation-delay:.04s}
main.anim tbody tr:nth-child(2){animation-delay:.07s}
main.anim tbody tr:nth-child(3){animation-delay:.10s}
main.anim tbody tr:nth-child(4){animation-delay:.13s}
main.anim tbody tr:nth-child(5){animation-delay:.16s}
main.anim tbody tr:nth-child(n+6){animation-delay:.19s}

/* Light sheen sweep across dark feature cards / hero tiles */
.card.feature,.stat.hero{position:relative;overflow:hidden}
.card.feature::before,.stat.hero::before{content:"";position:absolute;top:0;left:-60%;width:55%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.16),transparent);
  transform:skewX(-18deg);animation:sheen 6.5s ease-in-out infinite;pointer-events:none}
@keyframes sheen{0%,72%{left:-60%}88%,100%{left:130%}}

/* Richer hover interactions */
.card{transition:transform .18s cubic-bezier(.22,.61,.36,1), box-shadow .18s ease, border-color .18s ease}
.card:hover{transform:translateY(-3px) scale(1.012)}
.card.feature:hover,.stat.hero:hover{box-shadow:0 10px 30px rgba(17,30,62,.28)}
.stat{transition:transform .18s ease, box-shadow .18s ease}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.pill{transition:transform .15s ease, background .15s ease}
tbody tr:hover .pill{transform:translateX(3px)}
#refreshBtn{transition:transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .12s ease}
#refreshBtn:hover{transform:rotate(180deg)}
#refreshBtn:active{transform:rotate(360deg) scale(.92)}
#backBtn{transition:transform .14s ease}
#backBtn:active{transform:translateX(-2px) scale(.96)}
.brandmark{transition:transform .25s ease}
.brandmark:hover{transform:scale(1.08) rotate(-3deg)}

/* Loading spinner gets a soft glow */
.spinner{box-shadow:0 0 22px rgba(228,103,19,.18)}
.center{animation:riseIn .5s ease both}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  body::before{opacity:.5}
}

</style>
</head>

function val(sheet){ return (DATA&&DATA.sheets[sheet])?DATA.sheets[sheet].values:null; }
function disp(sheet){ return (DATA&&DATA.sheets[sheet])?DATA.sheets[sheet].display:null; }
function hasSheet(s){ return !!(DATA&&DATA.sheets[s]); }

function isNum(v){return typeof v==="number"&&!isNaN(v);}
function money(v){
  if(v==null||v===""||(typeof v==="number"&&isNaN(v))) return "";
  const n=Number(v); if(isNaN(n)) return String(v);
  const s=Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:2});
  return n<0?`(${s})`:s;
}
// Convert an Excel date serial (e.g. 46174) to dd/mm/yy.
// Passes through strings that already look like dates, and blanks.
function xlDate(v){
  if(v==null||v==="") return "";
  // Accept real numbers AND numeric strings like "46174" (some sheets send serials as text).
  const n = typeof v==="number" ? v
          : (typeof v==="string" && /^\s*\d{4,6}(\.\d+)?\s*$/.test(v) ? parseFloat(v) : NaN);
  if(!isNaN(n) && n>20000 && n<80000){                     // plausible date serial
    const ms=Math.round((n-25569)*86400000);               // Excel epoch -> Unix
    const d=new Date(ms);
    if(!isNaN(d)){
      const dd=String(d.getUTCDate()).padStart(2,"0");
      const mm=String(d.getUTCMonth()+1).padStart(2,"0");
      const yy=String(d.getUTCFullYear()).slice(-2);
      return `${dd}/${mm}/${yy}`;
    }
  }
  return String(v);
}

async function loadData(force){
  setStatus("load","Loading…");
  if(DATA_URL==="PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE"){ showConfigError(); return; }
  try{
    const res=await fetch(DATA_URL+(force?("?_t="+Date.now()):""),{cache:"no-store"});
    if(!res.ok){ showFetchError("HTTP "+res.status); return; }
    const j=await res.json();
    if(j.error){ showFetchError(j.error); return; }
    DATA=j;
    const t=DATA.updated?new Date(DATA.updated).toLocaleString("en-GB"):new Date().toLocaleTimeString();
    setStatus("ok","Updated "+t);
    if(NAV.view==="index") renderIndex(); else openSheet(NAV.sheet,NAV.display);
  }catch(e){ showFetchError(e.message); }
}
function setStatus(cls,txt){
  document.getElementById("statusDot").className="dot "+(cls||"");
  document.getElementById("statusText").textContent=txt;
}

function ledgerSheets(){
  const out=[]; const v=val("Outstanding"); if(!v) return out;
  for(const row of v){
    const name=row[1], sheet=row[2], bal=row[3];
    if(name&&sheet&&sheet!=="Ledger"&&hasSheet(String(sheet).trim())){
      out.push({name:String(name).trim(),sheet:String(sheet).trim(),bal:isNum(bal)?bal:null});
    }
  }
  return out;
}

  if(keys.length){

    for(const k of keys) html+=`<div class="card feature" onclick="openSheet('${esc(k.s)}','${esc(k.n)}')">

function openSheet(sheet,display){
  NAV={view:"sheet",sheet,display};
  document.getElementById("backBtn").style.display="";
  document.getElementById("brandmark").style.display="none";
  document.getElementById("searchWrap").classList.add("hide");
  document.getElementById("title").textContent=display||sheet;
  window.scrollTo(0,0);
  document.getElementById("main").className="anim";
  if(!hasSheet(sheet)){document.getElementById("main").innerHTML='<div class="empty">Sheet not found.</div>';return;}
  if(sheet==="Outstanding") return renderOutstanding();
  if(sheet==="Master Paid") return renderMasterPaid();
  if(SALES_SHEETS.includes(sheet)) return renderGeneric(sheet);
  return renderLedger(sheet);
}

function hasVal(x){return !(x==null||x==="");}

function renderLedger(sheet){
  const v=val(sheet), d=disp(sheet);

  /* ---- Table 1: running account (cols A:G), data starts at row 5 / index 4 ---- */
  let body="",lastBal=null,totalVol=0,totalAmt=0,totalPaid=0;
  for(let i=4;i<v.length;i++){
    const row=v[i]||[];
    const date=row[0],vol=row[1],price=row[2],amt=row[3],paid=row[4],prod=row[5],bal=row[6];
    const realFigure=(isNum(vol)&&vol!==0)||(isNum(amt)&&amt!==0)||(isNum(paid)&&paid!==0);
    if(!(hasVal(date)||realFigure||hasVal(prod))) continue;
    if(isNum(vol))totalVol+=vol; if(isNum(amt))totalAmt+=amt; if(isNum(paid))totalPaid+=paid;
    if(isNum(bal))lastBal=bal;
    const dd=d[i]||[];
    const paidCell=(isNum(paid)&&paid!==0)?money(paid):"";
    const dateCell=xlDate(date)||escHtml(dd[0]||"");
    body+=`<tr>
      <td>${dateCell}</td>
      <td class="num">${hasVal(vol)?money(vol):""}</td>
      <td class="num">${hasVal(price)?money(price):""}</td>
      <td class="num">${hasVal(amt)?money(amt):""}</td>
      <td class="num pos">${paidCell}</td>
      <td>${escHtml(prod||"")}</td>
      <td class="num">${hasVal(bal)?money(bal):""}</td></tr>`;
  }

  /* ---- Table 2: invoice / bill detail (cols Q:Y). Header row has S="Bill No". ---- */
  let billHdr=-1;
  for(let i=0;i<v.length;i++){
    const row=v[i]||[];
    if(String(row[18]||"").toLowerCase().indexOf("bill")>=0){ billHdr=i; break; }
  }
  let billBody="", billNote="", billCount=0;
  if(billHdr>=0){
    for(let i=billHdr+1;i<v.length;i++){
      const row=v[i]||[], dd=d[i]||[];
      const cells=[17,18,19,20,21,22,23].map(x=>row[x]);
      if(cells.every(x=>!hasVal(x))) continue;
      if(typeof cells[0]==="string" && !hasVal(cells[1])){ billNote=cells[0]; continue; }
      billCount++;
      billBody+=`<tr>
        <td>${xlDate(cells[0])||escHtml(dd[17]||"")}</td>
        <td>${escHtml(cells[1]||"")}</td>
        <td>${escHtml(cells[2]||"")}</td>
        <td class="num">${hasVal(cells[3])?money(cells[3]):""}</td>
        <td class="num">${hasVal(cells[4])?money(cells[4]):""}</td>
        <td class="num">${hasVal(cells[5])?money(cells[5]):""}</td>
        <td>${escHtml(cells[6]||"")}</td></tr>`;
    }
  }

  /* ---- Header / summary ---- */
  const balCls=lastBal>1?"pos":(lastBal<-1?"neg":"zero");
  const t1=v[1]&&v[1][0]?String(v[1][0]):"";
  const t2=v[2]&&v[2][0]?String(v[2][0]):"";
  let html=`<div class="subtitle">${escHtml(t1)}${t2?" · "+escHtml(t2):""}</div>
    <div class="ledger-summary">
      <div class="stat hero"><div class="lbl">Outstanding</div><div class="val ${balCls=='pos'?'':balCls}" style="color:#fff">₹ ${lastBal!=null?money(lastBal):"—"}</div></div>
      <div class="stat"><div class="lbl">Total Billed</div><div class="val">₹ ${money(totalAmt)}</div></div>
      <div class="stat"><div class="lbl">Total Paid</div><div class="val">₹ ${money(totalPaid)}</div></div>
      <div class="stat"><div class="lbl">Volume (Ltr)</div><div class="val">${money(totalVol)}</div></div>
    </div>`;

  /* account table */
  if(body){
    html+=`<div class="section-label">Account Statement</div>
    <div class="tablewrap"><table><thead><tr>
      <th>Date</th><th class="num">Volume</th><th class="num">Price</th><th class="num">Amount</th>
      <th class="num">Paid</th><th>Product</th><th class="num">Balance</th></tr></thead><tbody>${body}</tbody></table></div>`;
  } else {
    html+='<div class="empty">No account entries yet.</div>';
  }

  /* invoice detail table */
  if(billCount>0){
    html+=`<div class="section-label">Bill Details (${billCount})</div>
    <div class="tablewrap"><table><thead><tr>
      <th>Date</th><th>Bill No</th><th>Vehicle</th><th class="num">Quantity</th>
      <th class="num">Price/Ltr</th><th class="num">Amount</th><th>Product</th></tr></thead><tbody>${billBody}</tbody></table></div>`;
  } else if(billHdr>=0){
    html+=`<div class="section-label">Bill Details</div>
    <div class="empty" style="padding:22px">${escHtml(billNote||"No bills in range")}</div>`;
  }

  document.getElementById("main").innerHTML=html;
}

function renderMasterPaid(){
  const v=val("Master Paid"), d=disp("Master Paid");
  let body="",total=0,count=0;
  for(let i=1;i<v.length;i++){
    const row=v[i]; if(!row) continue;
    const date=row[0],cust=row[1],amt=row[2],note=row[3];
    if((date==null||date==="")&&(cust==null||cust==="")&&(amt==null||amt==="")) continue;
    if(isNum(amt)){total+=amt;count++;}
    const dd=d&&d[i]?d[i]:[];
    body+=`<tr><td>${xlDate(date)||escHtml(dd[0]||"")}</td><td>${escHtml(cust||"")}</td>
      <td class="num">${amt!=null&&amt!==""?money(amt):""}</td><td>${escHtml(note||"")}</td></tr>`;
  }
  let html=`<div class="ledger-summary">
    <div class="stat"><div class="lbl">Total Received</div><div class="val">₹ ${money(total)}</div></div>
    <div class="stat"><div class="lbl">Payments</div><div class="val">${count}</div></div></div>`;
  html+=`<div class="tablewrap"><table><thead><tr><th>Date</th><th>Customer</th>
    <th class="num">Amount Paid</th><th>Note</th></tr></thead><tbody>${body}</tbody></table></div>`;
  document.getElementById("main").innerHTML=html;
}

function renderOutstanding(){
  const leds=ledgerSheets();
  let total=0; leds.forEach(l=>{if(isNum(l.bal))total+=l.bal;});
  const sorted=[...leds].sort((a,b)=>(b.bal||0)-(a.bal||0));
  let body="";
  for(const l of sorted){
    const cls=l.bal>1?"pos":(l.bal<-1?"neg":"zero");
    body+=`<tr onclick="openSheet('${esc(l.sheet)}','${esc(l.name)}')" style="cursor:pointer">
      <td>${escHtml(l.name)}</td>
      <td class="num ${cls}">${l.bal!=null?money(l.bal):"—"}</td>
      <td><span class="pill">${escHtml(l.sheet)} ›</span></td></tr>`;
  }
  let html=`<div class="ledger-summary">
    <div class="stat hero"><div class="lbl">Total Outstanding</div><div class="val" style="color:#fff">₹ ${money(total)}</div></div>
    <div class="stat"><div class="lbl">Accounts</div><div class="val">${leds.length}</div></div></div>
    <div class="subtitle">Tap a row to open that customer's ledger.</div>`;
  html+=`<div class="tablewrap"><table><thead><tr><th>Customer</th>
    <th class="num">Outstanding</th><th>Ledger</th></tr></thead><tbody>${body}</tbody></table></div>`;
  document.getElementById("main").innerHTML=html;
}

function renderGeneric(sheet){
  const v=val(sheet), d=disp(sheet);
  let hi=0;
  for(let i=0;i<Math.min(v.length,8);i++){
    const c=(v[i]||[]).filter(x=>x!=null&&x!=="").length;
    if(c>=2){hi=i;break;}
  }
  const head=v[hi]||[]; const ncol=head.length;
  // Decide once per column whether it holds dates, so sheets like
  // "HSD Daily" / "MS Daily" (where the date header may be blank) still format correctly.
  const dateCols=[];
  for(let c=0;c<ncol;c++) dateCols[c]=colIsDate(v,hi,c,head);
  let ths="";
  for(let c=0;c<ncol;c++) ths+=`<th class="${!dateCols[c]&&colIsNum(v,hi,c)?'num':''}">${escHtml(head[c]??"")}</th>`;
  let body="";
  for(let i=hi+1;i<v.length;i++){
    const row=v[i]; if(!row||row.every(x=>x==null||x==="")) continue;
    const dd=d&&d[i]?d[i]:[];
    let tds="";
    for(let c=0;c<ncol;c++){
      const raw=row[c]; const num=isNum(raw);
      const isDateCol=dateCols[c];
      let cell;
      if(isDateCol) cell=xlDate(raw)||((dd[c]!=null&&dd[c]!=="")?dd[c]:"");
      else cell=(dd[c]!=null&&dd[c]!=="")?dd[c]:(raw==null?"":raw);
      tds+=`<td class="${num&&!isDateCol?'num':''}">${escHtml(cell)}</td>`;
    }
    body+=`<tr>${tds}</tr>`;
  }
  if(!body){document.getElementById("main").innerHTML='<div class="empty">No data.</div>';return;}
  document.getElementById("main").innerHTML=
    `<div class="tablewrap"><table><thead><tr>${ths}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function colIsNum(v,hi,c){
  for(let i=hi+1;i<Math.min(v.length,hi+12);i++){if(v[i]&&isNum(v[i][c]))return true;}return false;
}
// A column is a date column if its header says so, or if its values are predominantly
// Excel date serials. The value test is limited to leading/unlabeled columns so large
// numeric quantities (litres, amounts) are never mistaken for dates.
function colIsDate(v,hi,c,head){
  const label=String((head&&head[c])||"").trim();
  if(/date|^dt$/i.test(label)) return true;
  if(c>1 && label!=="") return false;
  let hits=0,tot=0;
  for(let i=hi+1;i<Math.min(v.length,hi+30);i++){
    const x=v[i]&&v[i][c];
    if(x==null||x==="") continue;
    const n = typeof x==="number" ? x
            : (typeof x==="string" && /^\s*\d{4,6}(\.\d+)?\s*$/.test(x) ? parseFloat(x) : NaN);
    if(!isNaN(n)){ tot++; if(n>=20000 && n<60000 && Math.abs(n-Math.round(n))<1e-6) hits++; }
    else if(typeof x==="string" && /\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}/.test(x)){ tot++; hits++; }
  }
  return tot>=2 && hits/tot>=0.8;
}

}

function esc(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function escHtml(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
