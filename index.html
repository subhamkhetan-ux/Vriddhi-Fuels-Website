<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Master Ledger">
<meta name="theme-color" content="#111E3E">
<title>Master Ledger</title>
<link rel="apple-touch-icon" href="Vriddhi%20Fuels%20Logo.png">
<link rel="icon" type="image/png" href="Vriddhi%20Fuels%20Logo.png">

<style>
:root{
  /* IndianOil palette */
  --orange:#E46713; --orange-soft:#f0853a; --orange-tint:#fff1e6;
  --navy:#111E3E; --navy-2:#1a2c52;
  /* Apple-light surfaces */
  --bg:#f5f6f8; --bg-grad-top:#eef1f6;
  --card:#ffffff; --card-2:#fbfcfe;
  --line:#e7e9ee; --line-2:#eef0f4;
  --txt:#1c2430; --txt-2:#5b6573; --txt-3:#8b94a3;
  --pos:#c2410c; --neg:#0f9d6e; --zero:#9aa3b2;
  --radius:18px; --radius-sm:13px;
  --shadow:0 1px 2px rgba(17,30,62,.04), 0 6px 20px rgba(17,30,62,.06);
  --shadow-lg:0 4px 12px rgba(17,30,62,.08), 0 16px 40px rgba(17,30,62,.10);
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0e1320; --bg-grad-top:#121a2c;
    --card:#172033; --card-2:#1b2538;
    --line:#27324a; --line-2:#222c42;
    --txt:#eef2f8; --txt-2:#a7b1c4; --txt-3:#7b8499;
    --orange-tint:#2a1d12;
    --pos:#ff8a4c; --neg:#3fd29a; --zero:#7b8499;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.28);
    --shadow-lg:0 4px 12px rgba(0,0,0,.35), 0 16px 40px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;color:var(--txt);
  background:linear-gradient(180deg,var(--bg-grad-top),var(--bg) 240px);
  background-attachment:fixed;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--orange);text-decoration:none}

/* ---------- Header ---------- */
header{position:sticky;top:0;z-index:30;
  background:color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line-2);
  padding:calc(var(--safe-top) + 12px) 16px 12px}
.hrow{display:flex;align-items:center;gap:11px;max-width:1040px;margin:0 auto}
.brandmark{width:30px;height:30px;border-radius:8px;flex:none;object-fit:cover;
  box-shadow:0 1px 4px rgba(17,30,62,.18)}
.htitle{font-weight:700;font-size:18px;letter-spacing:-.3px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{background:var(--card);border:1px solid var(--line);color:var(--txt);
  padding:8px 13px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:var(--shadow);transition:transform .12s ease, box-shadow .12s ease}
.btn:hover{box-shadow:var(--shadow-lg)}
.btn:active{transform:scale(.95)}
.btn.accent{background:linear-gradient(180deg,var(--orange-soft),var(--orange));
  border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(228,103,19,.35)}
.btn.icon{padding:8px 11px;font-size:15px;font-weight:700}
.status{font-size:12px;color:var(--txt-3);margin:8px auto 0;display:flex;align-items:center;gap:7px;
  max-width:1040px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--txt-3);flex:none;
  box-shadow:0 0 0 3px color-mix(in srgb,var(--txt-3) 18%,transparent)}
.dot.ok{background:var(--neg);box-shadow:0 0 0 3px color-mix(in srgb,var(--neg) 20%,transparent)}
.dot.err{background:#e0524e;box-shadow:0 0 0 3px rgba(224,82,78,.2)}
.dot.load{background:var(--orange);box-shadow:0 0 0 3px rgba(228,103,19,.2);
  animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ---------- Search ---------- */
.searchwrap{padding:14px 16px 0;max-width:1040px;margin:0 auto}
.search{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
  padding:13px 16px;border-radius:13px;font-size:16px;outline:none;
  box-shadow:var(--shadow);transition:border-color .15s, box-shadow .15s}
.search::placeholder{color:var(--txt-3)}
.search:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(228,103,19,.12)}

main{padding:16px 16px calc(var(--safe-bot) + 48px);max-width:1040px;margin:0 auto}

/* ---------- Section labels ---------- */
.section-label{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--txt-3);margin:26px 4px 12px;display:flex;align-items:center;gap:8px}
.section-label:first-child{margin-top:10px}
.section-label::before{content:"";width:14px;height:2px;border-radius:2px;background:var(--orange);opacity:.7}

/* ---------- Index cards ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(164px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:5px;min-height:74px;
  justify-content:center;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease}
.card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--orange-soft),var(--orange));opacity:0;transition:opacity .15s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:transparent}
.card:hover::after{opacity:1}
.card:active{transform:translateY(0) scale(.99)}
.card .cname{font-weight:650;font-size:14.5px;line-height:1.32;letter-spacing:-.2px}
.card .cmeta{font-size:12.5px;color:var(--txt-3)}
.card .cbal{font-size:14px;font-weight:750;margin-top:3px;letter-spacing:-.2px;font-variant-numeric:tabular-nums}
.card.feature{background:linear-gradient(135deg,var(--navy-2),var(--navy));border-color:transparent}
.card.feature .cname{color:#fff}
.card.feature .cmeta{color:rgba(255,255,255,.6)}
.card.feature::after{display:none}
.pos{color:var(--pos)} .zero{color:var(--zero)} .neg{color:var(--neg)}

/* ---------- Summary stat tiles ---------- */
.ledger-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:8px 0 18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 16px;box-shadow:var(--shadow)}
.stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-3);font-weight:600}
.stat .val{font-size:21px;font-weight:750;margin-top:5px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.stat.hero{background:linear-gradient(135deg,var(--navy-2),var(--navy));border-color:transparent}
.stat.hero .lbl{color:rgba(255,255,255,.65)}
.stat.hero .val{color:#fff}

/* ---------- Tables ---------- */
.tablewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:auto;-webkit-overflow-scrolling:touch;margin-top:6px;box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:max-content}
th,td{padding:11px 15px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line-2)}
th{position:sticky;top:0;background:var(--card-2);font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;color:var(--txt-3);font-weight:700;z-index:2;
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
td{color:var(--txt)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--orange-tint)}
tr:last-child td{border-bottom:none}
tbody tr:active{background:var(--orange-tint)}
/* opening / carried-forward balance rows */
tbody tr.ledger-open{background:color-mix(in srgb,var(--orange) 7%,transparent)}
tbody tr.ledger-open:hover{background:var(--orange-tint)}
tbody tr.ledger-open td{font-weight:650}
tbody tr.ledger-open .ob{font-style:italic;font-weight:600;color:var(--txt-2)}

.subtitle{color:var(--txt-2);font-size:13.5px;margin:0 4px 16px;font-weight:500}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--orange-tint);
  border:1px solid color-mix(in srgb,var(--orange) 22%,transparent);color:var(--orange);font-weight:600}

/* ---------- States ---------- */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:80px 20px;text-align:center;color:var(--txt-3)}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--orange);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:var(--card);border:1px solid #e0524e;border-radius:var(--radius);
  padding:20px;margin-top:16px;font-size:14px;color:var(--txt);box-shadow:var(--shadow)}
.errbox code{background:var(--navy);padding:2px 7px;border-radius:6px;font-size:12px;
  color:var(--orange-soft);word-break:break-all}
.hide{display:none!important}
.empty{padding:44px 20px;text-align:center;color:var(--txt-3);font-size:14px}

/* index hero logo */
.indexhero{display:flex;align-items:center;gap:14px;padding:6px 4px 2px}
.indexhero img{width:54px;height:54px;border-radius:16px;object-fit:cover;box-shadow:var(--shadow);
  animation:logoFloat 6s ease-in-out infinite, logoGlow 4.5s ease-in-out infinite}
.indexhero .ht{font-size:22px;font-weight:800;letter-spacing:-.6px;
  background:linear-gradient(90deg,var(--txt),var(--txt) 55%,var(--orange));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.indexhero .hs{font-size:13px;color:var(--txt-3);margin-top:1px}

/* ============================================================
   Motion layer — aesthetic entrance, ambient glow, micro-interactions.
   All of it collapses under prefers-reduced-motion (see bottom).
   ============================================================ */

/* Ambient drifting aurora behind the whole page */
body::before{content:"";position:fixed;inset:-20% -10% auto -10%;height:560px;z-index:-1;
  pointer-events:none;opacity:.7;
  background:
    radial-gradient(420px 300px at 18% 12%, color-mix(in srgb,var(--orange) 22%,transparent), transparent 70%),
    radial-gradient(460px 320px at 88% 4%, color-mix(in srgb,#2a8bdc 20%,transparent), transparent 72%);
  filter:blur(8px);animation:auroraDrift 18s ease-in-out infinite alternate}
@keyframes auroraDrift{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(2.5%,1.5%,0) scale(1.06)}
  100%{transform:translate3d(-2%,-1%,0) scale(1.03)}
}

/* Animated logo */
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(-1.5deg)}}
@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 4px 10px rgba(228,103,19,.28))}
  50%{filter:drop-shadow(0 6px 18px rgba(30,146,224,.34))}
}
.brandmark{animation:logoGlow 4.5s ease-in-out infinite}

/* Entrance: rise + fade, staggered for direct children of #main */
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
main.anim>*{animation:riseIn .5s cubic-bezier(.22,.61,.36,1) both}
main.anim>*:nth-child(1){animation-delay:.02s}
main.anim>*:nth-child(2){animation-delay:.08s}
main.anim>*:nth-child(3){animation-delay:.14s}
main.anim>*:nth-child(4){animation-delay:.20s}
main.anim>*:nth-child(5){animation-delay:.26s}
main.anim>*:nth-child(n+6){animation-delay:.30s}

/* Cards cascade within a grid */
main.anim .grid .card{animation:popIn .46s cubic-bezier(.22,.61,.36,1) both}
main.anim .grid .card:nth-child(1){animation-delay:.05s}
main.anim .grid .card:nth-child(2){animation-delay:.10s}
main.anim .grid .card:nth-child(3){animation-delay:.15s}
main.anim .grid .card:nth-child(4){animation-delay:.20s}
main.anim .grid .card:nth-child(5){animation-delay:.25s}
main.anim .grid .card:nth-child(6){animation-delay:.30s}
main.anim .grid .card:nth-child(7){animation-delay:.34s}
main.anim .grid .card:nth-child(8){animation-delay:.38s}
main.anim .grid .card:nth-child(n+9){animation-delay:.42s}

/* Stat tiles + first table rows */
main.anim .stat{animation:popIn .5s cubic-bezier(.22,.61,.36,1) both}
main.anim .stat:nth-child(2){animation-delay:.07s}
main.anim .stat:nth-child(3){animation-delay:.13s}
main.anim tbody tr:nth-child(-n+14){animation:riseIn .42s ease both}
main.anim tbody tr:nth-child(1){animation-delay:.04s}
main.anim tbody tr:nth-child(2){animation-delay:.07s}
main.anim tbody tr:nth-child(3){animation-delay:.10s}
main.anim tbody tr:nth-child(4){animation-delay:.13s}
main.anim tbody tr:nth-child(5){animation-delay:.16s}
main.anim tbody tr:nth-child(n+6){animation-delay:.19s}

/* Light sheen sweep across dark feature cards / hero tiles */
.card.feature,.stat.hero{position:relative;overflow:hidden}
.card.feature::before,.stat.hero::before{content:"";position:absolute;top:0;left:-60%;width:55%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.16),transparent);
  transform:skewX(-18deg);animation:sheen 6.5s ease-in-out infinite;pointer-events:none}
@keyframes sheen{0%,72%{left:-60%}88%,100%{left:130%}}

/* Richer hover interactions */
.card{transition:transform .18s cubic-bezier(.22,.61,.36,1), box-shadow .18s ease, border-color .18s ease}
.card:hover{transform:translateY(-3px) scale(1.012)}
.card.feature:hover,.stat.hero:hover{box-shadow:0 10px 30px rgba(17,30,62,.28)}
.stat{transition:transform .18s ease, box-shadow .18s ease}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.pill{transition:transform .15s ease, background .15s ease}
tbody tr:hover .pill{transform:translateX(3px)}
#refreshBtn{transition:transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .12s ease}
#refreshBtn:hover{transform:rotate(180deg)}
#refreshBtn:active{transform:rotate(360deg) scale(.92)}
#backBtn{transition:transform .14s ease}
#backBtn:active{transform:translateX(-2px) scale(.96)}
.brandmark{transition:transform .25s ease}
.brandmark:hover{transform:scale(1.08) rotate(-3deg)}

/* Loading spinner gets a soft glow */
.spinner{box-shadow:0 0 22px rgba(228,103,19,.18)}
.center{animation:riseIn .5s ease both}

/* ============================================================
   Dashboard: snapshot tiles, daily-sales cards, top customers
   ============================================================ */
.stat{position:relative;overflow:hidden}
.stat .val .unit{font-size:13px;font-weight:600;color:var(--txt-3);letter-spacing:0}
.stat.accent{background:linear-gradient(135deg,var(--card),var(--orange-tint));
  border-color:color-mix(in srgb,var(--orange) 20%,transparent)}
.stat.hero .val,.stat .val{transition:transform .2s ease}
.stat:hover .val{transform:scale(1.02)}

.daily-grid{grid-template-columns:repeat(auto-fit,minmax(248px,1fr))}
.daycard{position:relative;overflow:hidden;cursor:pointer;border-radius:var(--radius);
  border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow);padding:16px;
  display:flex;flex-direction:column;gap:13px;
  transition:transform .16s cubic-bezier(.22,.61,.36,1), box-shadow .16s ease, border-color .16s ease}
.daycard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
.daycard.hsd::before{background:linear-gradient(180deg,var(--orange-soft),var(--orange))}
.daycard.ms::before{background:linear-gradient(180deg,#3AA6F0,#0E6FC4)}
.daycard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:transparent}
.dc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dc-name{font-weight:750;font-size:14.5px;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
.dc-ico{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;color:#fff;
  font-size:11px;font-weight:800;letter-spacing:.3px;flex:none}
.daycard.hsd .dc-ico{background:linear-gradient(135deg,var(--orange-soft),var(--orange));
  box-shadow:0 3px 10px rgba(228,103,19,.35)}
.daycard.ms .dc-ico{background:linear-gradient(135deg,#3AA6F0,#0E6FC4);
  box-shadow:0 3px 10px rgba(14,111,196,.35)}
.dc-date{font-size:11.5px;font-weight:700;color:var(--txt-2);background:var(--line-2);
  padding:4px 11px;border-radius:20px;white-space:nowrap}
.dc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dc-metric .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-3);font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-metric .val{font-size:18.5px;font-weight:800;letter-spacing:-.4px;margin-top:3px;
  font-variant-numeric:tabular-nums}
.dc-metric .val .unit{font-size:12px;font-weight:600;color:var(--txt-3)}

.toplist{display:flex;flex-direction:column;gap:10px}
.topcust.card{flex-direction:row;align-items:center;gap:13px;padding:13px 15px}
.topcust .rank{width:28px;height:28px;border-radius:9px;flex:none;display:grid;place-items:center;
  font-weight:800;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--navy-2),var(--navy))}
.topcust:nth-child(1) .rank{background:linear-gradient(135deg,#f6b84a,#e07b13);
  box-shadow:0 3px 12px rgba(228,103,19,.4)}
.topcust:nth-child(2) .rank{background:linear-gradient(135deg,#9fb0c9,#6c7c96)}
.topcust:nth-child(3) .rank{background:linear-gradient(135deg,#cf9b6b,#a06a39)}
.topcust .tc-main{flex:1;min-width:0}
.topcust .tc-name{font-weight:700;font-size:14px;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topcust .tc-bar{height:6px;border-radius:5px;background:var(--line-2);overflow:hidden;margin-top:7px}
.topcust .tc-bar>span{display:block;height:100%;border-radius:5px;
  background:linear-gradient(90deg,var(--orange-soft),var(--orange));
  animation:barGrow .8s cubic-bezier(.22,.61,.36,1) both}
@keyframes barGrow{from{width:0!important}}
.topcust .tc-side{text-align:right;flex:none}
.topcust .tc-val{font-weight:800;font-size:14.5px;letter-spacing:-.2px;font-variant-numeric:tabular-nums}
.topcust .tc-meta{font-size:11px;color:var(--txt-3);margin-top:1px}

/* ============================================================
   Welcome / splash screen
   ============================================================ */
.welcome{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  padding:calc(var(--safe-top) + 24px) 24px calc(var(--safe-bot) + 24px);
  background:radial-gradient(120% 120% at 50% 0%, #1a2c52 0%, #111E3E 46%, #0b1430 100%);
  overflow:hidden;opacity:1;transition:opacity .6s ease, visibility .6s ease}
.welcome.gone{opacity:0;visibility:hidden;pointer-events:none}
/* drifting colour blobs */
.welcome .wbg{position:absolute;inset:-15%;pointer-events:none;
  background:
    radial-gradient(440px 360px at 20% 18%, color-mix(in srgb,var(--orange) 55%,transparent), transparent 65%),
    radial-gradient(480px 380px at 82% 30%, color-mix(in srgb,#2a8bdc 55%,transparent), transparent 66%),
    radial-gradient(420px 420px at 50% 96%, color-mix(in srgb,var(--orange) 30%,transparent), transparent 70%);
  filter:blur(20px);opacity:.55;animation:auroraDrift 16s ease-in-out infinite alternate}
.wcard{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;
  max-width:360px;width:100%}
.wlogo{position:relative;width:128px;height:128px;display:flex;align-items:center;justify-content:center;
  animation:wPop .8s cubic-bezier(.34,1.56,.64,1) both}
.wlogo img{width:108px;height:108px;border-radius:28px;object-fit:cover;position:relative;z-index:2;
  box-shadow:0 18px 50px rgba(0,0,0,.45);animation:logoFloat 6s ease-in-out infinite}
.wring{position:absolute;inset:-6px;border-radius:34px;z-index:1;
  background:conic-gradient(from 0deg, var(--orange), #3AA6F0, var(--orange));
  filter:blur(9px);opacity:.7;animation:wSpin 7s linear infinite}
/* glossy streak sweeping across the logo tile */
.wshine{position:absolute;width:108px;height:108px;border-radius:28px;overflow:hidden;z-index:3;
  pointer-events:none}
.wshine::before{content:"";position:absolute;top:-60%;left:-160%;width:55%;height:220%;
  transform:rotate(9deg);
  background:linear-gradient(105deg,transparent 0%,rgba(255,255,255,.0) 35%,rgba(255,255,255,.75) 50%,rgba(255,255,255,.0) 65%,transparent 100%);
  animation:wShine 3.8s ease-in-out infinite}
@keyframes wShine{0%{left:-160%}58%,100%{left:170%}}
/* slow light beam drifting across the whole welcome backdrop */
.wsweep{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;opacity:.5}
.wsweep::before{content:"";position:absolute;top:-30%;left:-50%;width:42%;height:160%;
  transform:rotate(14deg);filter:blur(14px);
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.16),transparent);
  animation:wDrift 7.5s ease-in-out infinite}
@keyframes wDrift{0%{left:-50%}60%,100%{left:130%}}
/* one-shot bright sweep fired when entering the dashboard */
.wflash{position:absolute;inset:0;z-index:6;pointer-events:none;overflow:hidden;opacity:0}
.wflash::before{content:"";position:absolute;top:-25%;left:-45%;width:38%;height:150%;
  transform:rotate(13deg);filter:blur(7px);
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.92),transparent)}
.welcome.flash .wflash{opacity:1}
.welcome.flash .wflash::before{animation:wFlash .75s cubic-bezier(.4,0,.2,1) forwards}
@keyframes wFlash{from{left:-45%}to{left:135%}}
.wbrand{font-size:30px;font-weight:900;letter-spacing:1px;color:#fff;line-height:1.05;
  text-shadow:0 2px 18px rgba(0,0,0,.35);animation:wRise .7s ease both;animation-delay:.18s}
.wtag{font-size:14.5px;font-weight:500;font-style:italic;letter-spacing:.3px;line-height:1.4;
  color:rgba(255,255,255,.7);margin-top:-2px;max-width:300px;
  animation:wRise .7s ease both;animation-delay:.28s}
.wtag::before,.wtag::after{content:"";display:inline-block;width:16px;height:1px;vertical-align:middle;
  margin:0 8px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent)}
.wloader{margin-top:22px;width:190px;height:4px;border-radius:4px;overflow:hidden;
  background:rgba(255,255,255,.14);animation:wRise .7s ease both;animation-delay:.4s}
.wbar{display:block;height:100%;width:42%;border-radius:4px;
  background:linear-gradient(90deg,var(--orange-soft),var(--orange));
  box-shadow:0 0 12px rgba(228,103,19,.6);animation:wLoad 1.15s ease-in-out infinite}
@keyframes wLoad{0%{transform:translateX(-130%)}100%{transform:translateX(340%)}}
.wfoot{font-size:12px;color:rgba(255,255,255,.45);margin-top:12px;letter-spacing:.3px;
  animation:wRise .7s ease both;animation-delay:.5s}
@keyframes wPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:none}}
@keyframes wRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes wSpin{to{transform:rotate(360deg)}}
@keyframes wPulse{0%,100%{box-shadow:0 10px 30px rgba(228,103,19,.42), inset 0 1px 0 rgba(255,255,255,.25)}
  50%{box-shadow:0 14px 40px rgba(228,103,19,.62), inset 0 1px 0 rgba(255,255,255,.3)}}

@media (prefers-color-scheme: dark){
  .welcome{background:radial-gradient(120% 120% at 50% 0%, #16233f 0%, #0c1430 50%, #070d20 100%)}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  body::before{opacity:.5}
  .welcome{transition:opacity .25s ease!important}
}

</style>
</head>
<body>
<!-- ===== Welcome / splash screen ===== -->
<div id="welcome" class="welcome">
  <div class="wbg" aria-hidden="true"></div>
  <div class="wsweep" aria-hidden="true"></div>
  <div class="wflash" aria-hidden="true"></div>
  <div class="wcard">
    <div class="wlogo">
      <span class="wring"></span>
      <img id="welcomeLogo" src="" alt="Vriddhi Fuels">
      <span class="wshine"></span>
    </div>
    <div class="wbrand">VRIDDHI&nbsp;FUELS</div>
    <div class="wtag">Where Trust Fuels Progress</div>
    <div class="wloader"><span class="wbar"></span></div>
    <div class="wfoot">Preparing your dashboard…</div>
  </div>
</div>
<header>
  <div class="hrow">
    <button class="btn" id="backBtn" onclick="goIndex()" style="display:none">‹ Index</button>
    <img class="brandmark" id="brandmark" src="Vriddhi%20Fuels%20Logo.png" alt="Vriddhi Fuels">
    <div class="htitle" id="title">Master Ledger</div>
    <button class="btn accent icon" id="refreshBtn" onclick="loadData(true)">↻</button>
  </div>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Starting…</span></div>
</header>

<div class="searchwrap" id="searchWrap">
  <input class="search" id="search" placeholder="Search customers, ledgers, sheets…" oninput="renderIndex()">
</div>

<main id="main">
  <div class="center"><div class="spinner"></div><div>Loading ledger…</div></div>
</main>

<script>
/* ============================================================
   CONFIG — paste your Apps Script Web App URL here.
   It ends in /exec  (NOT /dev).
   ============================================================ */
const DATA_URL = "https://script.google.com/macros/s/AKfycbzNC2KNGSZgeaQzKa9YJt7J3VCknQAbPXuFp3q8Vzeuo7J6CEkY6yg_uGclCqwqglmQsg/exec";

const EMBLEM="Vriddhi%20Fuels%20Logo.png";
const SALES_SHEETS = ["HSD Sale","MS Sale","XG Sale","Other Sale","HSD Daily","MS Daily","HSD FY Summary","MS FY Summary"];
let DATA=null, NAV={view:"index"};

function val(sheet){ return (DATA&&DATA.sheets[sheet])?DATA.sheets[sheet].values:null; }
function disp(sheet){ return (DATA&&DATA.sheets[sheet])?DATA.sheets[sheet].display:null; }
function hasSheet(s){ return !!(DATA&&DATA.sheets[s]); }

function isNum(v){return typeof v==="number"&&!isNaN(v);}
function money(v){
  if(v==null||v===""||(typeof v==="number"&&isNaN(v))) return "";
  const n=Number(v); if(isNaN(n)) return String(v);
  const s=Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:2});
  return n<0?`(${s})`:s;
}
// Convert an Excel date serial (e.g. 46174) to dd/mm/yy.
// Passes through strings that already look like dates, and blanks.
function xlDate(v){
  if(v==null||v==="") return "";
  // Accept real numbers AND numeric strings like "46174" (some sheets send serials as text).
  const n = typeof v==="number" ? v
          : (typeof v==="string" && /^\s*\d{4,6}(\.\d+)?\s*$/.test(v) ? parseFloat(v) : NaN);
  if(!isNaN(n) && n>20000 && n<80000){                     // plausible date serial
    const ms=Math.round((n-25569)*86400000);               // Excel epoch -> Unix
    const d=new Date(ms);
    if(!isNaN(d)){
      const dd=String(d.getUTCDate()).padStart(2,"0");
      const mm=String(d.getUTCMonth()+1).padStart(2,"0");
      const yy=String(d.getUTCFullYear()).slice(-2);
      return `${dd}/${mm}/${yy}`;
    }
  }
  return String(v);
}

async function loadData(force){
  setStatus("load","Loading…");
  if(DATA_URL==="PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE"){ showConfigError(); welcomeReady(); return; }
  try{
    const res=await fetch(DATA_URL+(force?("?_t="+Date.now()):""),{cache:"no-store"});
    if(!res.ok){ showFetchError("HTTP "+res.status); return; }
    const j=await res.json();
    if(j.error){ showFetchError(j.error); return; }
    DATA=j;
    const t=DATA.updated?new Date(DATA.updated).toLocaleString("en-GB"):new Date().toLocaleTimeString();
    setStatus("ok","Updated "+t);
    if(NAV.view==="index") renderIndex(); else openSheet(NAV.sheet,NAV.display);
  }catch(e){ showFetchError(e.message); }
  finally{ welcomeReady(); }
}

/* ---- Welcome screen ---- */
const WELCOME_MIN_MS=2400;     // keep the splash on screen long enough to be seen
let welcomeStart=Date.now(), welcomeEntered=false;
// Data is ready (or the safety timer fired): auto-enter once the splash has shown its minimum.
function welcomeReady(){
  if(welcomeEntered) return;
  setTimeout(enterApp, Math.max(0, WELCOME_MIN_MS-(Date.now()-welcomeStart)));
}
function enterApp(){
  if(welcomeEntered) return; welcomeEntered=true;
  const w=document.getElementById("welcome"); if(!w)return;
  w.classList.add("flash");                    // bright shine wipes across…
  setTimeout(()=>w.classList.add("gone"),380); // …then fade through to the dashboard
  setTimeout(()=>w.remove(),1050);
}
function setStatus(cls,txt){
  document.getElementById("statusDot").className="dot "+(cls||"");
  document.getElementById("statusText").textContent=txt;
}

function ledgerSheets(){
  const out=[]; const v=val("Outstanding"); if(!v) return out;
  for(const row of v){
    const name=row[1], sheet=row[2], bal=row[3];
    if(name&&sheet&&sheet!=="Ledger"&&hasSheet(String(sheet).trim())){
      out.push({name:String(name).trim(),sheet:String(sheet).trim(),bal:isNum(bal)?bal:null});
    }
  }
  return out;
}

/* ============================================================
   Dashboard analytics — summaries derived from the sheets.
   ============================================================ */
// Compact Indian-style number: 12.5 K / 3.4 L / 1.2 Cr (trims trailing zeros).
function shortNum(n){
  if(!isNum(n)) return "—";
  const a=Math.abs(n);
  const fmt=(x,suf)=>x.toFixed(2).replace(/\.?0+$/,"")+suf;
  if(a>=1e7) return fmt(n/1e7," Cr");
  if(a>=1e5) return fmt(n/1e5," L");
  if(a>=1e3) return fmt(n/1e3," K");
  return String(Math.round(n));
}
function shortVol(n){
  if(!isNum(n)) return "—";
  const a=Math.abs(n);
  const fmt=(x,suf)=>x.toFixed(2).replace(/\.?0+$/,"")+suf;
  if(a>=1e7) return fmt(n/1e7," Cr");
  if(a>=1e5) return fmt(n/1e5," Lakh");
  if(a>=1e3) return fmt(n/1e3," K");
  return String(Math.round(n));
}

// Per-customer totals from a ledger sheet (cols A:G, data from row 5 / index 4).
function ledgerTotals(sheet){
  const v=val(sheet); if(!v) return {billed:0,paid:0,vol:0,bal:null,lastDate:null};
  let billed=0,paid=0,vol=0,bal=null,lastDate=null;
  for(let i=4;i<v.length;i++){
    const row=v[i]||[];
    const date=row[0],vl=row[1],amt=row[3],pd=row[4],b=row[6];
    const real=(isNum(vl)&&vl!==0)||(isNum(amt)&&amt!==0)||(isNum(pd)&&pd!==0);
    if(!(hasVal(date)||real)) continue;
    if(isNum(vl))vol+=vl; if(isNum(amt))billed+=amt; if(isNum(pd))paid+=pd;
    if(isNum(b))bal=b;
    if(hasVal(date))lastDate=date;
  }
  return {billed,paid,vol,bal,lastDate};
}

// Aggregate across every customer ledger + a ranked top list.
function dashboardStats(){
  const leds=ledgerSheets();
  let totalOut=0,totalBilled=0,totalPaid=0,totalVol=0;
  const rows=[];
  for(const l of leds){
    const t=ledgerTotals(l.sheet);
    totalBilled+=t.billed; totalPaid+=t.paid; totalVol+=t.vol;
    if(isNum(l.bal)) totalOut+=l.bal;
    rows.push({name:l.name,sheet:l.sheet,bal:l.bal,billed:t.billed,paid:t.paid,vol:t.vol});
  }
  const top=rows.filter(r=>r.billed>0).sort((a,b)=>b.billed-a.billed).slice(0,6);
  return {accounts:leds.length,totalOut,totalBilled,totalPaid,totalVol,top};
}

// Classify a daily-sheet column purely from its header — never from magnitude,
// so stock columns (Opening/Closing) are never mistaken for sales.
function dailyColKind(label){
  const h=String(label||"").toLowerCase();
  if(!h.trim()) return "other";
  if(/rate|price|mrp|\/\s*ltr|per\s*l(tr|itre)?\b/.test(h)) return "rate";
  if(/amount|amt|value|₹|\brs\b|rupee|turnover|revenue|sales?\s*(amt|amount|value|total)/.test(h)) return "amount";
  if(/sale|sold|qty|quantit|ltr|litre|liter|volume|dispatch|nozzle|dip/.test(h)) return "volume";
  return "other";
}
// Latest day + running totals from a daily sheet. Column layout is *detected*,
// and when sales columns can't be identified by header we fall back to showing the
// latest day's own numeric columns (with their real labels) rather than guessing.
function dailySummary(sheet){
  const v=val(sheet); if(!v||!v.length) return null;
  // widest row defines column count; header = first row with >=2 filled cells.
  let ncol=0; for(let i=0;i<v.length;i++){ if(v[i]&&v[i].length>ncol) ncol=v[i].length; }
  let hi=0;
  for(let i=0;i<Math.min(v.length,8);i++){
    const c=(v[i]||[]).filter(x=>x!=null&&x!=="").length;
    if(c>=2){hi=i;break;}
  }
  const head=v[hi]||[];
  const H=c=>String(head[c]??"");
  // date column (header- or value-detected)
  let dc=-1;
  for(let c=0;c<ncol;c++){ if(colIsDate(v,hi,c,head)){dc=c;break;} }
  // per-column numeric presence
  const numCount=[]; for(let c=0;c<ncol;c++){ let n=0; for(let i=hi+1;i<v.length;i++){ if(isNum(v[i]&&v[i][c])) n++; } numCount[c]=n; }
  const kind=[]; for(let c=0;c<ncol;c++){ kind[c]=(c===dc)?"date":dailyColKind(H(c)); }
  const firstOf=k=>{ for(let c=0;c<ncol;c++){ if(c!==dc&&numCount[c]>0&&kind[c]===k) return c; } return -1; };
  const amtC=firstOf("amount");
  const volC=firstOf("volume");
  // latest *dated* row (a trailing "Total"/label row can't pose as the latest day)
  const looksDate=(x)=>isNum(x)?(x>=20000&&x<60000):(typeof x==="string"&&/\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}|^\s*\d{4,6}\s*$/.test(x));
  let last=-1;
  for(let i=hi+1;i<v.length;i++){
    const row=v[i]; if(!row) continue;
    if(dc>=0 ? looksDate(row[dc]) : row.some(hasVal)) last=i;
  }
  if(last<0) return null;
  const lr=v[last]||[];
  const sum=c=>{ if(c<0) return null; let s=0,any=false; for(let i=hi+1;i<v.length;i++){const x=v[i]&&v[i][c]; if(isNum(x)){s+=x;any=true;}} return any?s:null; };

  // Build the latest-day metrics. Prefer identified volume + amount columns;
  // otherwise fall back to the day's other numeric columns (shown plainly, by label).
  const metrics=[];
  if(volC>=0 && isNum(lr[volC])) metrics.push({label:H(volC)||"Sold", value:lr[volC], kind:"vol"});
  if(amtC>=0 && isNum(lr[amtC])) metrics.push({label:H(amtC)||"Amount", value:lr[amtC], kind:"amt"});
  if(metrics.length<2){
    for(let c=0;c<ncol && metrics.length<2;c++){
      if(c===dc||c===volC||c===amtC) continue;
      if(kind[c]==="rate") continue;
      if(!isNum(lr[c])) continue;
      metrics.push({label:H(c)||("Col "+(c+1)), value:lr[c], kind:"num"});
    }
  }
  if(!metrics.length) return null;

  const totals=[];
  const tv=sum(volC); if(volC>=0 && tv!=null) totals.push({label:"Total "+(H(volC)||"Volume"), value:tv, kind:"vol"});
  const ta=sum(amtC); if(amtC>=0 && ta!=null) totals.push({label:"Total "+(H(amtC)||"Sales"), value:ta, kind:"amt"});

  return {
    date: dc>=0 ? (xlDate(lr[dc])||String(lr[dc]??"")) : "",
    identified: (volC>=0||amtC>=0),
    metrics, totals
  };
}

// Top Customers — shown near the top of the index, directly under the hero.
function dashboardTopHTML(s){
  if(!s.top.length) return "";
  const max=s.top[0].billed||1;
  let html='<div class="section-label">Top Customers</div><div class="toplist">';
  s.top.forEach((c,i)=>{
    const pct=Math.max(6,Math.round((c.billed/max)*100));
    const due=isNum(c.bal)&&c.bal>1?`₹ ${shortNum(c.bal)} due`:(isNum(c.bal)&&c.bal<-1?`₹ ${shortNum(-c.bal)} adv`:"Settled");
    html+=`<div class="topcust card" onclick="openSheet('${esc(c.sheet)}','${esc(c.name)}')">
      <div class="rank">${i+1}</div>
      <div class="tc-main"><div class="tc-name">${escHtml(c.name)}</div>
        <div class="tc-bar"><span style="width:${pct}%"></span></div></div>
      <div class="tc-side"><div class="tc-val" title="₹ ${money(c.billed)}">₹ ${shortNum(c.billed)}</div>
        <div class="tc-meta">${due}</div></div></div>`;
  });
  html+='</div>';
  return html;
}

// Business Snapshot + Latest Daily Sales — shown at the bottom of the index.
function dashboardBottomHTML(s){
  let html="";

  // Business Snapshot
  if(s.accounts>0){
    html+='<div class="section-label">Business Snapshot</div>';
    html+='<div class="ledger-summary">';
    html+=`<div class="stat hero"><div class="lbl">Total Outstanding</div>
      <div class="val" style="color:#fff" title="₹ ${money(s.totalOut)}">₹ ${shortNum(s.totalOut)}</div></div>`;
    html+=`<div class="stat accent"><div class="lbl">Total Sales (Billed)</div>
      <div class="val" title="₹ ${money(s.totalBilled)}">₹ ${shortNum(s.totalBilled)}</div></div>`;
    html+=`<div class="stat"><div class="lbl">Total Collected</div>
      <div class="val" title="₹ ${money(s.totalPaid)}">₹ ${shortNum(s.totalPaid)}</div></div>`;
    html+=`<div class="stat"><div class="lbl">Volume Sold</div>
      <div class="val" title="${money(s.totalVol)} Ltr">${shortVol(s.totalVol)}<span class="unit"> Ltr</span></div></div>`;
    html+=`<div class="stat"><div class="lbl">Customer Accounts</div>
      <div class="val">${s.accounts}</div></div>`;
    html+='</div>';
  }

  // Latest Daily Sales — only the latest sale date's figures (no running totals)
  const fmtMetric=(m)=> m.kind==="amt" ? `₹ ${money(m.value)}`
                      : m.kind==="vol" ? `${money(m.value)}<span class="unit"> Ltr</span>`
                      : `${money(m.value)}`;
  const dailies=[{s:"HSD Daily",c:"hsd",k:"HSD"},{s:"MS Daily",c:"ms",k:"MS"}].filter(x=>hasSheet(x.s));
  const cards=[];
  for(const d of dailies){
    const ds=dailySummary(d.s); if(!ds) continue;
    const metrics=ds.metrics.map(m=>
      `<div class="dc-metric"><div class="k" title="${escHtml(m.label)}">${escHtml(m.label)}</div>
        <div class="val" title="${escHtml(String(m.value))}">${fmtMetric(m)}</div></div>`).join("");
    if(!metrics) continue;
    cards.push(`<div class="daycard ${d.c}" onclick="openSheet('${esc(d.s)}','${esc(d.s)}')">
      <div class="dc-top"><div class="dc-name"><span class="dc-ico">${d.k}</span>${escHtml(d.s)}</div>
        ${ds.date?`<span class="dc-date">${escHtml(ds.date)} · latest</span>`:""}</div>
      <div class="dc-metrics">${metrics}</div></div>`);
  }
  if(cards.length){
    html+='<div class="section-label">Latest Daily Sales</div>';
    html+=`<div class="grid daily-grid">${cards.join("")}</div>`;
  }

  return html;
}

function renderIndex(){
  NAV={view:"index"};
  document.getElementById("backBtn").style.display="none";
  document.getElementById("brandmark").style.display="";
  document.getElementById("searchWrap").classList.remove("hide");
  document.getElementById("title").textContent="Master Ledger";
  const q=(document.getElementById("search").value||"").toLowerCase().trim();
  const m=document.getElementById("main");
  if(!DATA){m.innerHTML='<div class="center"><div class="spinner"></div><div>Loading…</div></div>';return;}
  const match=(s)=>!q||String(s).toLowerCase().includes(q);
  let html="";
  let stats=null;

  // hero banner (only when not searching)
  if(!q){
    const leds0=ledgerSheets();
    let totalOut=0; leds0.forEach(l=>{if(isNum(l.bal))totalOut+=l.bal;});
    html+=`<div class="indexhero">
      <img src="${EMBLEM}" alt="">
      <div><div class="ht">Master Ledger</div>
      <div class="hs">${leds0.length} customer accounts · ₹ ${money(totalOut)} outstanding</div></div>
    </div>`;
    stats=dashboardStats();
  }

  const keys=[
    {n:"Outstanding Balances",s:"Outstanding",meta:"All balances"},
    {n:"Master Paid",s:"Master Paid",meta:"Payment log"}
  ].filter(k=>hasSheet(k.s)&&(match(k.n)||match(k.s)));
  if(keys.length){
    html+='<div class="section-label">Overview</div><div class="grid">';
    for(const k of keys) html+=`<div class="card feature" onclick="openSheet('${esc(k.s)}','${esc(k.n)}')">
      <div class="cname">${k.n}</div><div class="cmeta">${k.meta}</div></div>`;
    html+='</div>';
  }

  let leds=ledgerSheets().filter(l=>match(l.name)||match(l.sheet));
  leds.sort((a,b)=>(b.bal||0)-(a.bal||0));
  if(leds.length){
    html+='<div class="section-label">Customer Ledgers</div><div class="grid">';
    for(const l of leds){
      let cls="zero",bal="—";
      if(l.bal!=null){ bal="₹ "+money(l.bal); cls=l.bal>1?"pos":(l.bal<-1?"neg":"zero"); }
      html+=`<div class="card" onclick="openSheet('${esc(l.sheet)}','${esc(l.name)}')">
        <div class="cname">${escHtml(l.name)}</div>
        <div class="cbal ${cls}">${bal}</div></div>`;
    }
    html+='</div>';
  }

  // Top Customers — between Customer Ledgers and Sales & Summaries
  if(!q && stats) html+=dashboardTopHTML(stats);

  const sales=SALES_SHEETS.filter(s=>hasSheet(s)&&match(s));
  if(sales.length){
    html+='<div class="section-label">Sales & Summaries</div><div class="grid">';
    for(const s of sales) html+=`<div class="card" onclick="openSheet('${esc(s)}','${esc(s)}')">
      <div class="cname">${escHtml(s)}</div><div class="cmeta">Sheet</div></div>`;
    html+='</div>';
  }

  // Business Snapshot + Latest Daily Sales sit at the bottom of the dashboard
  if(!q && stats) html+=dashboardBottomHTML(stats);

  if(!html) html='<div class="empty">No matches for "'+escHtml(q)+'"</div>';
  m.innerHTML=html;
  m.className=q?"":"anim";   // stagger-in on the full index, but stay calm while searching
}

function openSheet(sheet,display){
  NAV={view:"sheet",sheet,display};
  document.getElementById("backBtn").style.display="";
  document.getElementById("brandmark").style.display="none";
  document.getElementById("searchWrap").classList.add("hide");
  document.getElementById("title").textContent=display||sheet;
  window.scrollTo(0,0);
  document.getElementById("main").className="anim";
  if(!hasSheet(sheet)){document.getElementById("main").innerHTML='<div class="empty">Sheet not found.</div>';return;}
  if(sheet==="Outstanding") return renderOutstanding();
  if(sheet==="Master Paid") return renderMasterPaid();
  if(SALES_SHEETS.includes(sheet)) return renderGeneric(sheet);
  return renderLedger(sheet);
}

function hasVal(x){return !(x==null||x==="");}

function renderLedger(sheet){
  const v=val(sheet), d=disp(sheet);

  /* ---- Table 1: running account (cols A:G), data starts at row 5 / index 4 ---- */
  let body="",lastBal=null,totalVol=0,totalAmt=0,totalPaid=0;
  for(let i=4;i<v.length;i++){
    const row=v[i]||[];
    const date=row[0],vol=row[1],price=row[2],amt=row[3],paid=row[4],prod=row[5],bal=row[6];
    const realFigure=(isNum(vol)&&vol!==0)||(isNum(amt)&&amt!==0)||(isNum(paid)&&paid!==0);
    const hasContent=hasVal(date)||realFigure||hasVal(prod);
    // An opening / carried-forward balance row holds a balance but no transaction.
    const balOnly=!hasContent && isNum(bal);
    if(!hasContent && !balOnly) continue;
    // Skip blank rows where only a filled-down balance repeats the running total
    // (a genuine opening balance is either the first one, labelled, dated, or changes).
    if(balOnly && bal===lastBal) continue;

    if(isNum(vol))totalVol+=vol; if(isNum(amt))totalAmt+=amt; if(isNum(paid))totalPaid+=paid;
    if(isNum(bal))lastBal=bal;
    const dd=d[i]||[];
    const paidCell=(isNum(paid)&&paid!==0)?money(paid):"";
    const dateCell=xlDate(date)||escHtml(dd[0]||"");
    // Recognise opening-balance rows so they read clearly even when unlabelled.
    const txt=(String(prod||"")+" "+String(date||"")).toLowerCase();
    const isOpening=balOnly||/\bopening\b|op\.?\s*bal|\bb[\/.]?[fd]\b|brought|carried/.test(txt);
    const openLbl=(balOnly&&!hasVal(date)&&!hasVal(prod))?'<span class="ob">Opening Balance</span>':"";
    body+=`<tr${isOpening?' class="ledger-open"':''}>
      <td>${dateCell||openLbl}</td>
      <td class="num">${hasVal(vol)?money(vol):""}</td>
      <td class="num">${hasVal(price)?money(price):""}</td>
      <td class="num">${hasVal(amt)?money(amt):""}</td>
      <td class="num pos">${paidCell}</td>
      <td>${escHtml(prod||"")}</td>
      <td class="num">${hasVal(bal)?money(bal):""}</td></tr>`;
  }

  /* ---- Table 2: invoice / bill detail (cols Q:Y). Header row has S="Bill No". ---- */
  let billHdr=-1;
  for(let i=0;i<v.length;i++){
    const row=v[i]||[];
    if(String(row[18]||"").toLowerCase().indexOf("bill")>=0){ billHdr=i; break; }
  }
  let billBody="", billNote="", billCount=0;
  if(billHdr>=0){
    for(let i=billHdr+1;i<v.length;i++){
      const row=v[i]||[], dd=d[i]||[];
      const cells=[17,18,19,20,21,22,23].map(x=>row[x]);
      if(cells.every(x=>!hasVal(x))) continue;
      if(typeof cells[0]==="string" && !hasVal(cells[1])){ billNote=cells[0]; continue; }
      billCount++;
      billBody+=`<tr>
        <td>${xlDate(cells[0])||escHtml(dd[17]||"")}</td>
        <td>${escHtml(cells[1]||"")}</td>
        <td>${escHtml(cells[2]||"")}</td>
        <td class="num">${hasVal(cells[3])?money(cells[3]):""}</td>
        <td class="num">${hasVal(cells[4])?money(cells[4]):""}</td>
        <td class="num">${hasVal(cells[5])?money(cells[5]):""}</td>
        <td>${escHtml(cells[6]||"")}</td></tr>`;
    }
  }

  /* ---- Header / summary ---- */
  const balCls=lastBal>1?"pos":(lastBal<-1?"neg":"zero");
  const t1=v[1]&&v[1][0]?String(v[1][0]):"";
  const t2=v[2]&&v[2][0]?String(v[2][0]):"";
  let html=`<div class="subtitle">${escHtml(t1)}${t2?" · "+escHtml(t2):""}</div>
    <div class="ledger-summary">
      <div class="stat hero"><div class="lbl">Outstanding</div><div class="val ${balCls=='pos'?'':balCls}" style="color:#fff">₹ ${lastBal!=null?money(lastBal):"—"}</div></div>
      <div class="stat"><div class="lbl">Total Billed</div><div class="val">₹ ${money(totalAmt)}</div></div>
      <div class="stat"><div class="lbl">Total Paid</div><div class="val">₹ ${money(totalPaid)}</div></div>
      <div class="stat"><div class="lbl">Volume (Ltr)</div><div class="val">${money(totalVol)}</div></div>
    </div>`;

  /* account table */
  if(body){
    html+=`<div class="section-label">Account Statement</div>
    <div class="tablewrap"><table><thead><tr>
      <th>Date</th><th class="num">Volume</th><th class="num">Price</th><th class="num">Amount</th>
      <th class="num">Paid</th><th>Product</th><th class="num">Balance</th></tr></thead><tbody>${body}</tbody></table></div>`;
  } else {
    html+='<div class="empty">No account entries yet.</div>';
  }

  /* invoice detail table */
  if(billCount>0){
    html+=`<div class="section-label">Bill Details (${billCount})</div>
    <div class="tablewrap"><table><thead><tr>
      <th>Date</th><th>Bill No</th><th>Vehicle</th><th class="num">Quantity</th>
      <th class="num">Price/Ltr</th><th class="num">Amount</th><th>Product</th></tr></thead><tbody>${billBody}</tbody></table></div>`;
  } else if(billHdr>=0){
    html+=`<div class="section-label">Bill Details</div>
    <div class="empty" style="padding:22px">${escHtml(billNote||"No bills in range")}</div>`;
  }

  document.getElementById("main").innerHTML=html;
}

function renderMasterPaid(){
  const v=val("Master Paid"), d=disp("Master Paid");
  let body="",total=0,count=0;
  for(let i=1;i<v.length;i++){
    const row=v[i]; if(!row) continue;
    const date=row[0],cust=row[1],amt=row[2],note=row[3];
    if((date==null||date==="")&&(cust==null||cust==="")&&(amt==null||amt==="")) continue;
    if(isNum(amt)){total+=amt;count++;}
    const dd=d&&d[i]?d[i]:[];
    body+=`<tr><td>${xlDate(date)||escHtml(dd[0]||"")}</td><td>${escHtml(cust||"")}</td>
      <td class="num">${amt!=null&&amt!==""?money(amt):""}</td><td>${escHtml(note||"")}</td></tr>`;
  }
  let html=`<div class="ledger-summary">
    <div class="stat"><div class="lbl">Total Received</div><div class="val">₹ ${money(total)}</div></div>
    <div class="stat"><div class="lbl">Payments</div><div class="val">${count}</div></div></div>`;
  html+=`<div class="tablewrap"><table><thead><tr><th>Date</th><th>Customer</th>
    <th class="num">Amount Paid</th><th>Note</th></tr></thead><tbody>${body}</tbody></table></div>`;
  document.getElementById("main").innerHTML=html;
}

function renderOutstanding(){
  const leds=ledgerSheets();
  let total=0; leds.forEach(l=>{if(isNum(l.bal))total+=l.bal;});
  const sorted=[...leds].sort((a,b)=>(b.bal||0)-(a.bal||0));
  let body="";
  for(const l of sorted){
    const cls=l.bal>1?"pos":(l.bal<-1?"neg":"zero");
    body+=`<tr onclick="openSheet('${esc(l.sheet)}','${esc(l.name)}')" style="cursor:pointer">
      <td>${escHtml(l.name)}</td>
      <td class="num ${cls}">${l.bal!=null?money(l.bal):"—"}</td>
      <td><span class="pill">${escHtml(l.sheet)} ›</span></td></tr>`;
  }
  let html=`<div class="ledger-summary">
    <div class="stat hero"><div class="lbl">Total Outstanding</div><div class="val" style="color:#fff">₹ ${money(total)}</div></div>
    <div class="stat"><div class="lbl">Accounts</div><div class="val">${leds.length}</div></div></div>
    <div class="subtitle">Tap a row to open that customer's ledger.</div>`;
  html+=`<div class="tablewrap"><table><thead><tr><th>Customer</th>
    <th class="num">Outstanding</th><th>Ledger</th></tr></thead><tbody>${body}</tbody></table></div>`;
  document.getElementById("main").innerHTML=html;
}

function renderGeneric(sheet){
  const v=val(sheet), d=disp(sheet);
  let hi=0;
  for(let i=0;i<Math.min(v.length,8);i++){
    const c=(v[i]||[]).filter(x=>x!=null&&x!=="").length;
    if(c>=2){hi=i;break;}
  }
  const head=v[hi]||[]; const ncol=head.length;
  // Decide once per column whether it holds dates, so sheets like
  // "HSD Daily" / "MS Daily" (where the date header may be blank) still format correctly.
  const dateCols=[];
  for(let c=0;c<ncol;c++) dateCols[c]=colIsDate(v,hi,c,head);
  let ths="";
  for(let c=0;c<ncol;c++) ths+=`<th class="${!dateCols[c]&&colIsNum(v,hi,c)?'num':''}">${escHtml(head[c]??"")}</th>`;
  let body="";
  for(let i=hi+1;i<v.length;i++){
    const row=v[i]; if(!row||row.every(x=>x==null||x==="")) continue;
    const dd=d&&d[i]?d[i]:[];
    let tds="";
    for(let c=0;c<ncol;c++){
      const raw=row[c]; const num=isNum(raw);
      const isDateCol=dateCols[c];
      let cell;
      if(isDateCol) cell=xlDate(raw)||((dd[c]!=null&&dd[c]!=="")?dd[c]:"");
      else cell=(dd[c]!=null&&dd[c]!=="")?dd[c]:(raw==null?"":raw);
      tds+=`<td class="${num&&!isDateCol?'num':''}">${escHtml(cell)}</td>`;
    }
    body+=`<tr>${tds}</tr>`;
  }
  if(!body){document.getElementById("main").innerHTML='<div class="empty">No data.</div>';return;}
  document.getElementById("main").innerHTML=
    `<div class="tablewrap"><table><thead><tr>${ths}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function colIsNum(v,hi,c){
  for(let i=hi+1;i<Math.min(v.length,hi+12);i++){if(v[i]&&isNum(v[i][c]))return true;}return false;
}
// A column is a date column if its header says so, or if its values are predominantly
// Excel date serials. The value test is limited to leading/unlabeled columns so large
// numeric quantities (litres, amounts) are never mistaken for dates.
function colIsDate(v,hi,c,head){
  const label=String((head&&head[c])||"").trim();
  if(/date|^dt$/i.test(label)) return true;
  if(c>1 && label!=="") return false;
  let hits=0,tot=0;
  for(let i=hi+1;i<Math.min(v.length,hi+30);i++){
    const x=v[i]&&v[i][c];
    if(x==null||x==="") continue;
    const n = typeof x==="number" ? x
            : (typeof x==="string" && /^\s*\d{4,6}(\.\d+)?\s*$/.test(x) ? parseFloat(x) : NaN);
    if(!isNaN(n)){ tot++; if(n>=20000 && n<60000 && Math.abs(n-Math.round(n))<1e-6) hits++; }
    else if(typeof x==="string" && /\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}/.test(x)){ tot++; hits++; }
  }
  return tot>=2 && hits/tot>=0.8;
}

function showConfigError(){
  setStatus("err","Not configured");
  document.getElementById("main").innerHTML=`<div class="errbox">
   <b>One-time setup needed.</b><br><br>
   Deploy the Apps Script (see SETUP.txt), copy its Web App URL (ends in <code>/exec</code>),
   and paste it into this file where it says <code>PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE</code>.</div>`;
}
function showFetchError(msg){
  setStatus("err","Couldn't load");
  document.getElementById("main").innerHTML=`<div class="errbox">
   <b>Couldn't load data.</b><br><br>
   <span style="color:var(--muted)">Reason: </span><code>${escHtml(msg||"unknown")}</code><br><br>
   Checklist:<br>
   • Apps Script deployed as Web app, access = <b>Anyone</b><br>
   • The URL ends in <code>/exec</code> (not <code>/dev</code>)<br>
   • The File ID inside the script is correct<br><br>
   <button class="btn accent" onclick="loadData(true)">Retry</button></div>`;
}

function esc(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function escHtml(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

document.getElementById("welcomeLogo").src=EMBLEM;

loadData(false);
